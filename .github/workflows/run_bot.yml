name: Run Xiangqi Bot (3 Hours)
on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install websocket-client requests dnspython

      - name: Download and Setup Pikafish
        run: |
          sudo apt-get install -y p7zip-full
          wget https://github.com/official-pikafish/Pikafish/releases/download/Pikafish-2026-01-02/Pikafish.2026-01-02.7z
          7z x Pikafish.2026-01-02.7z
          # Tìm file binary phù hợp (giả sử là bản Linux)
          find . -name "pikafish-v*" -exec chmod +x {} \;
          # Copy ra thư mục gốc để script dễ tìm
          cp $(find . -name "pikafish-v*" | head -n 1) ./pikafish
          chmod +x ./pikafish

      - name: Run Bot for 3 Hours
        run: |
          # Chạy script với giới hạn thời gian 180 phút
          timeout 180m python tttt.py || echo "Bot session ended after 3 hours."
