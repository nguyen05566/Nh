name: Xiangqi Bot 24/7

on:
  # Chay moi 5 gio (GitHub Actions toi da 6h/job)
  schedule:
    - cron: '0 */1 * * *'
  # Cho phep chay thu cong
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 100  # 5.5 gio (duoi gioi han 6h)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify pikafish engine
        run: |
          python -c "
          try:
              from pikafish_terminal.engine import PikafishEngine
              from pikafish_terminal.difficulty import create_custom_difficulty
              d = create_custom_difficulty(depth=5)
              e = PikafishEngine(difficulty=d)
              e.new_game()
              move = e.best_move('rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKABNR w', [])
              print(f'Pikafish engine OK! Test move: {move}')
              e.quit()
          except Exception as ex:
              print(f'Pikafish engine error: {ex}')
              raise
          "

      - name: Run Xiangqi Bot
        env:
          GAMEVH_COOKIE: ${{ secrets.GAMEVH_COOKIE }}
          GAMEVH_NICKNAME: ${{ secrets.GAMEVH_NICKNAME }}
          GAMEVH_PLAYER_ID: ${{ secrets.GAMEVH_PLAYER_ID }}
          BOT_DEPTH: ${{ secrets.BOT_DEPTH }}
        run: |
          echo "=== Starting Xiangqi Bot ==="
          echo "Time: $(date -u)"
          echo "Bot will run for ~5.5 hours before GitHub Actions timeout"
          python -u xiangqi_bot.py
