name: Xiangqi Bot 24/7

on:
  # Chạy mỗi 5 giờ (GitHub Actions tối đa 6h/job)
  schedule:
    - cron: '0 */5 * * *'
  # Cho phép chạy thủ công
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # 5.5 giờ (dưới giới hạn 6h)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Xiangqi Bot
        env:
          GAMEVH_COOKIE: ${{ secrets.GAMEVH_COOKIE }}
          GAMEVH_NICKNAME: ${{ secrets.GAMEVH_NICKNAME }}
          GAMEVH_PLAYER_ID: ${{ secrets.GAMEVH_PLAYER_ID }}
          BOT_DEPTH: ${{ secrets.BOT_DEPTH }}
        run: |
          echo "=== Starting Xiangqi Bot ==="
          echo "Time: $(date -u)"
          echo "Bot will run for ~5.5 hours before GitHub Actions timeout"
          python -u xiangqi_bot.py
