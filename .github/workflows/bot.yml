name: Run BOT

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full wget
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Download Pikafish
  run: |
    set -e

    wget -O Pikafish.7z \
      https://github.com/official-pikafish/Pikafish/releases/download/Pikafish-2026-01-02/Pikafish.2026-01-02.7z

    7z x Pikafish.7z

    ENGINE=$(find . -type f \( -iname "pikafish" -o -iname "pikafish.exe" \) | head -n 1)

    if [ -z "$ENGINE" ]; then
      echo "Không tìm thấy Pikafish sau khi giải nén."
      find .
      exit 1
    fi

    chmod +x "$ENGINE"
    echo "PIKAFISH_PATH=$ENGINE" >> $GITHUB_ENV

    echo "Engine: $ENGINE"$(find . -type f -name pikafish | head -1)" >> $GITHUB_ENV

      - name: Run bot
        run: python ttlcvb.py
