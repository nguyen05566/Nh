name: Run 77.py

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: run-77
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Download Pikafish
        run: |
          sudo apt-get update
          sudo apt-get install --yes p7zip-full
          curl --fail --location --retry 3 \
            --output /tmp/pikafish.7z \
            https://github.com/official-pikafish/Pikafish/releases/download/Pikafish-2026-01-02/Pikafish.2026-01-02.7z
          echo "84257063905615919fb4ee6a70273a94843bb6ec04c45e3ac706098838bc1a49  /tmp/pikafish.7z" | sha256sum --check
          7z x /tmp/pikafish.7z -o/tmp/pikafish -y
          engine_path="$(find /tmp/pikafish -type f -path '*/Linux/pikafish-avx2' -print -quit)"
          test -n "$engine_path"
          install --mode=755 "$engine_path" ./pikafish
          curl --fail --location --retry 3 \
            --output ./pikafish.nnue \
            https://github.com/official-pikafish/Networks/releases/download/master-net/pikafish.nnue

      - name: Run 77.py
        run: python -u 77.py
