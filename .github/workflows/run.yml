name: Run Xiangqi Bot

concurrency:
  group: xiangqi-bot
  cancel-in-progress: true

on:
  workflow_dispatch: # Chạy thủ công
  schedule:
    - cron: '5 */5 * * *' # Tự động chạy mỗi 5 tiếng (0:05, 5:05, 10:05, 15:05, 20:05 UTC)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    env:
      # Lấy thông tin tài khoản an toàn từ GitHub Repository Secrets
      GAMEVH_COOKIE: ${{ secrets.GAMEVH_COOKIE }}
      GAMEVH_NICKNAME: ${{ secrets.GAMEVH_NICKNAME }} # Điền nguyen05511 hoặc nguyen05522 vào đây trên GitHub
      GAMEVH_PLAYER_ID: ${{ secrets.GAMEVH_PLAYER_ID }}
      
      # CẤU HÌNH ĐÃ GIẢM: Hạ độ sâu suy nghĩ xuống 15
      BOT_DEPTH: 20
      BOT_USE_CREATE_TABLE: 'true'
      BOT_BET_AMT_ID: 5
      BOT_MATCH_DURATION: 5
      BOT_TURN_DURATION: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests websocket-client

      - name: Download and Setup Pikafish Engine
        run: |
          echo "=====> Đang tải cấu trúc Pikafish Engine..."
          wget -q https://github.com/official-pikafish/Pikafish/releases/download/Pikafish-2026-01-02/Pikafish.2026-01-02.7z
          
          echo "=====> Đang giải nén file .7z..."
          7z x Pikafish.2026-01-02.7z -opikafish_extracted
          
          echo "=====> Thiết lập file chạy cho Linux Ubuntu..."
          # Tự động lọc bỏ file .exe, tìm file Linux (ưu tiên modern/avx2 cho tối ưu hiệu năng)
          LINUX_BIN=$(find pikafish_extracted -type f \( -name "*modern*" -o -name "*avx2*" -o -name "pikafish" \) ! -name "*.exe" | head -n 1)
          
          if [ -z "$LINUX_BIN" ]; then
            echo "❌ Không tìm thấy binary Linux phù hợp!"
            exit 1
          fi
          
          cp "$LINUX_BIN" ./pikafish
          chmod +x ./pikafish
          
          echo "=====> Cấu hình mạng Nơ-ron NNUE..."
          NNUE_FILE=$(find pikafish_extracted -type f -name "*.nnue" | head -n 1)
          if [ ! -z "$NNUE_FILE" ]; then
            cp "$NNUE_FILE" ./pikafish.nnue
            echo "✅ Cài đặt NNUE hoàn tất!"
          else
            echo "⚠️ Cảnh báo: Không tìm thấy file NNUE."
          fi

      - name: Start Bot
        run: |
          # Chạy chính xác file vb.py của bạn
          python vb.py